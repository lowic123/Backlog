name: Build Pull request
on:
  pull_request:
    types: [opened, synchronize, reopened]
env:
  # Dummy values for fork-safe PR builds. `pnpm build-local` uses
  # `tinacms build --content=local --skip-cloud-checks`, so it indexes
  # content from the filesystem and skips cloud validation — these env
  # vars just need to be present (not real) to satisfy the CLI's
  # requirement that clientId/branch/token be configured.
  NEXT_PUBLIC_TINA_CLIENT_ID: fake-id-for-smoke
  TINA_TOKEN: fake-token-for-smoke
  NEXT_PUBLIC_TINA_BRANCH: main
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build sample
    steps:
      steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build-local
